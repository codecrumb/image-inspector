<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Analyzer</title>
  <!-- Theme init: runs before render to prevent flash -->
  <script>
    (function () {
      const stored = localStorage.getItem('theme');
      if (stored) {
        if (stored === 'dark') document.documentElement.classList.add('dark');
      } else {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        localStorage.setItem('theme', prefersDark ? 'dark' : 'light');
        if (prefersDark) document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <!-- Instant background before Tailwind CDN loads — prevents flash -->
  <style>
    html { background-color: #f3f4f6; }
    html.dark { background-color: #111827; }
  </style>
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    .drop-active { border-color: #6366f1; background-color: #eef2ff; }
    .dark .drop-active { border-color: #818cf8; background-color: #1e1b4b; }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen flex flex-col items-center justify-center p-6 font-sans transition-colors duration-150">

  <div class="w-full max-w-2xl">
    <div class="flex items-center justify-center relative mb-1">
      <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-100 text-center">Image Analyzer</h1>
      <button
        id="themeToggle"
        class="absolute right-0 p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors"
        aria-label="Toggle dark mode"
      >
        <!-- Sun (shown in dark mode) -->
        <svg id="iconSun" class="hidden w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
        </svg>
        <!-- Moon (shown in light mode) -->
        <svg id="iconMoon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z" />
        </svg>
      </button>
    </div>
    <p class="text-gray-500 dark:text-gray-400 text-center mb-6 text-sm">Upload an image or video to inspect its metadata — no data leaves your browser.</p>

    <!-- Drop Zone -->
    <div
      id="dropzone"
      class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-2xl bg-white dark:bg-gray-800 p-10 text-center cursor-pointer transition-colors duration-150 hover:border-indigo-400 hover:bg-indigo-50 dark:hover:border-indigo-500 dark:hover:bg-indigo-950"
    >
      <svg class="mx-auto mb-3 w-12 h-12 text-gray-300 dark:text-gray-600" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
      </svg>
      <p class="text-gray-500 dark:text-gray-400 text-sm">Drag &amp; drop an image or video here, or</p>
      <label class="mt-2 inline-block cursor-pointer">
        <span class="mt-2 px-4 py-1.5 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700 transition-colors">Browse file</span>
        <input id="fileInput" type="file" accept="image/*,video/*" class="hidden" />
      </label>
      <p id="pasteHint" class="mt-2 text-xs text-gray-400 dark:text-gray-500"></p>
    </div>

    <!-- Results -->
    <div id="results" class="hidden mt-6 bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
      <!-- Preview -->
      <div class="flex items-center justify-center bg-gray-50 dark:bg-gray-700 border-b border-gray-200 dark:border-gray-700 p-4">
        <img id="preview" class="max-h-48 max-w-full rounded object-contain shadow" alt="Preview" />
        <canvas id="videoThumb" class="hidden max-h-48 max-w-full rounded object-contain shadow"></canvas>
      </div>

      <!-- Stats Grid -->
      <div class="grid grid-cols-2 gap-px bg-gray-200 dark:bg-gray-700">
        <!-- Always shown -->
        <div class="bg-white dark:bg-gray-800 p-4">
          <p class="text-xs uppercase tracking-wide text-gray-400 dark:text-gray-500 font-semibold mb-1">Format</p>
          <p id="stat-format" class="text-lg font-semibold text-gray-800 dark:text-gray-100">—</p>
        </div>
        <div class="bg-white dark:bg-gray-800 p-4">
          <p class="text-xs uppercase tracking-wide text-gray-400 dark:text-gray-500 font-semibold mb-1">File Size</p>
          <p id="stat-size" class="text-lg font-semibold text-gray-800 dark:text-gray-100">—</p>
        </div>
        <div class="bg-white dark:bg-gray-800 p-4 col-span-2">
          <p class="text-xs uppercase tracking-wide text-gray-400 dark:text-gray-500 font-semibold mb-1">Resolution</p>
          <p id="stat-resolution" class="text-lg font-semibold text-gray-800 dark:text-gray-100">—</p>
        </div>

        <!-- Image-only -->
        <div id="cell-pixels" class="bg-white dark:bg-gray-800 p-4">
          <p class="text-xs uppercase tracking-wide text-gray-400 dark:text-gray-500 font-semibold mb-1">Total Pixels</p>
          <p id="stat-pixels" class="text-lg font-semibold text-gray-800 dark:text-gray-100">—</p>
        </div>
        <div id="cell-dpi" class="bg-white dark:bg-gray-800 p-4">
          <p class="text-xs uppercase tracking-wide text-gray-400 dark:text-gray-500 font-semibold mb-1">DPI (from metadata)</p>
          <p id="stat-dpi" class="text-lg font-semibold text-gray-800 dark:text-gray-100">—</p>
          <p id="stat-dpi-note" class="text-xs text-gray-400 dark:text-gray-500 mt-0.5 hidden"></p>
        </div>

        <!-- Video-only (hidden by default) -->
        <div id="cell-duration" class="hidden bg-white dark:bg-gray-800 p-4">
          <p class="text-xs uppercase tracking-wide text-gray-400 dark:text-gray-500 font-semibold mb-1">Duration</p>
          <p id="stat-duration" class="text-lg font-semibold text-gray-800 dark:text-gray-100">—</p>
        </div>
        <div id="cell-bitrate" class="hidden bg-white dark:bg-gray-800 p-4">
          <p class="text-xs uppercase tracking-wide text-gray-400 dark:text-gray-500 font-semibold mb-1">Bitrate (est.)</p>
          <p id="stat-bitrate" class="text-lg font-semibold text-gray-800 dark:text-gray-100">—</p>
        </div>
        <div id="cell-fps" class="hidden bg-white dark:bg-gray-800 p-4 col-span-2">
          <p class="text-xs uppercase tracking-wide text-gray-400 dark:text-gray-500 font-semibold mb-1">Frame Rate</p>
          <p id="stat-fps" class="text-lg font-semibold text-gray-800 dark:text-gray-100">—</p>
          <p id="stat-fps-note" class="text-xs text-gray-400 dark:text-gray-500 mt-0.5 hidden"></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Paste hint
    const ua = navigator.userAgent;
    const isIPhone = /iPhone|iPod/.test(ua);
    const isIPad = /iPad/.test(ua) || (/Mac/.test(ua) && navigator.maxTouchPoints > 1);
    const isMac = /Mac/.test(ua) && !isIPad;
    const pasteHint = document.getElementById('pasteHint');
    if (!isIPhone) {
      pasteHint.textContent = 'or paste an image with ' + (isMac || isIPad ? 'Cmd+V' : 'Ctrl+V');
    }

    // Theme toggle
    const toggle = document.getElementById('themeToggle');
    const iconSun = document.getElementById('iconSun');
    const iconMoon = document.getElementById('iconMoon');

    function applyTheme(theme) {
      const isDark = theme === 'dark';
      document.documentElement.classList.toggle('dark', isDark);
      iconSun.classList.toggle('hidden', !isDark);
      iconMoon.classList.toggle('hidden', isDark);
    }

    applyTheme(localStorage.getItem('theme') || 'light');

    toggle.addEventListener('click', () => {
      const isDark = document.documentElement.classList.contains('dark');
      const next = isDark ? 'light' : 'dark';
      localStorage.setItem('theme', next);
      applyTheme(next);
    });

    // ── Shared utilities ──────────────────────────────────────────────────────

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function formatMimeType(mime) {
      const map = {
        'image/jpeg': 'JPEG', 'image/jpg': 'JPEG', 'image/png': 'PNG',
        'image/gif': 'GIF', 'image/webp': 'WebP', 'image/bmp': 'BMP',
        'image/tiff': 'TIFF', 'image/svg+xml': 'SVG', 'image/avif': 'AVIF',
        'image/heic': 'HEIC', 'image/heif': 'HEIF',
        'video/mp4': 'MP4', 'video/quicktime': 'MOV', 'video/webm': 'WebM',
        'video/x-msvideo': 'AVI', 'video/x-matroska': 'MKV',
        'video/ogg': 'OGG', 'video/3gpp': '3GP', 'video/x-ms-wmv': 'WMV',
      };
      return map[mime.toLowerCase()] ?? mime.replace(/^(image|video)\//, '').toUpperCase();
    }

    function formatDuration(s) {
      if (!isFinite(s) || s < 0) return '—';
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = Math.floor(s % 60);
      if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
      return `${m}:${String(sec).padStart(2, '0')}`;
    }

    function formatBitrate(bytes, seconds) {
      if (!seconds || !isFinite(seconds) || seconds <= 0) return '—';
      const bps = (bytes * 8) / seconds;
      if (bps >= 1e6) return (bps / 1e6).toFixed(1) + ' Mbps';
      return Math.round(bps / 1e3) + ' Kbps';
    }

    function readUint16BE(view, off) { return view.getUint16(off, false); }
    function readUint32BE(view, off) { return view.getUint32(off, false); }

    function readString(view, offset, len) {
      let s = '';
      for (let i = 0; i < len; i++) s += String.fromCharCode(view.getUint8(offset + i));
      return s;
    }

    // ── Image: DPI parsing ────────────────────────────────────────────────────

    function parseJPEGDPI(buffer) {
      const view = new DataView(buffer);
      if (buffer.byteLength < 4 || readUint16BE(view, 0) !== 0xFFD8) return null;
      let offset = 2;
      while (offset + 4 <= buffer.byteLength) {
        if (view.getUint8(offset) !== 0xFF) break;
        const marker = readUint16BE(view, offset);
        if (marker === 0xFFD9 || marker === 0xFFDA) break;
        if (marker === 0xFFD8 || (marker >= 0xFFD0 && marker <= 0xFFD7)) { offset += 2; continue; }
        const segLen = readUint16BE(view, offset + 2);
        const segStart = offset + 4;
        if (marker === 0xFFE0) {
          const id = readString(view, segStart, 5);
          if (id === 'JFIF\0') {
            const units = view.getUint8(segStart + 7);
            const xd = readUint16BE(view, segStart + 8);
            const yd = readUint16BE(view, segStart + 10);
            if (xd > 0 || yd > 0) {
              if (units === 1) return { label: `${xd} × ${yd} DPI`, note: 'Source: JFIF APP0' };
              if (units === 2) return { label: `${Math.round(xd*2.54)} × ${Math.round(yd*2.54)} DPI`, note: 'Source: JFIF APP0 (converted from DPCM)' };
              return { label: `${xd} × ${yd} (no unit)`, note: 'Source: JFIF APP0 — unit unspecified' };
            }
          }
        } else if (marker === 0xFFE1) {
          const id = readString(view, segStart, 6);
          if (id === 'Exif\0\0') { const r = parseEXIF(buffer, segStart + 6); if (r) return r; }
        }
        offset += 2 + segLen;
      }
      return null;
    }

    function parseEXIF(buffer, tiffBase) {
      const view = new DataView(buffer);
      if (tiffBase + 8 > buffer.byteLength) return null;
      const order = readString(view, tiffBase, 2);
      const le = order === 'II';
      const r16 = (off) => view.getUint16(tiffBase + off, le);
      const r32 = (off) => view.getUint32(tiffBase + off, le);
      const rRational = (off) => { const n = view.getUint32(tiffBase+off,le), d = view.getUint32(tiffBase+off+4,le); return d===0?0:n/d; };
      if (r16(2) !== 42) return null;
      const ifdOffset = r32(4);
      const entryCount = r16(ifdOffset);
      let xRes = null, yRes = null, unit = 2;
      for (let i = 0; i < entryCount; i++) {
        const entryOff = ifdOffset + 2 + i * 12;
        if (entryOff + 12 > buffer.byteLength - tiffBase) break;
        const tag = r16(entryOff), valOff = entryOff + 8;
        if (tag === 0x011A) xRes = rRational(r32(valOff));
        else if (tag === 0x011B) yRes = rRational(r32(valOff));
        else if (tag === 0x0128) unit = r16(valOff);
      }
      if (xRes !== null && yRes !== null && (xRes > 0 || yRes > 0)) {
        if (unit === 2) return { label: `${Math.round(xRes)} × ${Math.round(yRes)} DPI`, note: 'Source: EXIF IFD0' };
        if (unit === 3) return { label: `${Math.round(xRes*2.54)} × ${Math.round(yRes*2.54)} DPI`, note: 'Source: EXIF IFD0 (converted from DPCM)' };
        return { label: `${Math.round(xRes)} × ${Math.round(yRes)} (no unit)`, note: 'Source: EXIF IFD0 — unit unspecified' };
      }
      return null;
    }

    function parsePNGDPI(buffer) {
      const view = new DataView(buffer);
      let offset = 8;
      while (offset + 12 <= buffer.byteLength) {
        const length = view.getUint32(offset, false);
        const type = readString(view, offset + 4, 4);
        const dataOffset = offset + 8;
        if (type === 'pHYs') {
          const ppuX = view.getUint32(dataOffset, false);
          const ppuY = view.getUint32(dataOffset + 4, false);
          const unit = view.getUint8(dataOffset + 8);
          if (unit === 1) return { label: `${Math.round(ppuX*0.0254)} × ${Math.round(ppuY*0.0254)} DPI`, note: 'Source: PNG pHYs chunk (converted from px/m)' };
          return { label: `${ppuX} × ${ppuY} (aspect only, no unit)`, note: 'Source: PNG pHYs chunk — unit unknown' };
        }
        if (type === 'IDAT' || type === 'IEND') break;
        offset += 12 + length;
      }
      return null;
    }

    // ── Video: MP4 frame rate parsing ─────────────────────────────────────────

    function parseMP4FrameRate(buffer) {
      const view = new DataView(buffer);
      const len = buffer.byteLength;

      // Walk a flat list of boxes between [offset, end), return the first matching type
      function findBox(offset, end, type) {
        while (offset + 8 <= end) {
          const size = view.getUint32(offset, false);
          const t = readString(view, offset + 4, 4);
          if (size < 8 || offset + size > end) break;
          if (t === type) return { data: offset + 8, end: offset + size };
          offset += size;
        }
        return null;
      }

      try {
        const moov = findBox(0, len, 'moov');
        if (!moov) return null;

        // Walk trak boxes inside moov; find the video track
        let off = moov.data;
        while (off + 8 <= moov.end) {
          const size = view.getUint32(off, false);
          const type = readString(view, off + 4, 4);
          if (size < 8) break;

          if (type === 'trak') {
            const trakData = off + 8, trakEnd = off + size;
            const mdia = findBox(trakData, trakEnd, 'mdia');
            if (mdia) {
              // Confirm this is the video track via hdlr handler_type = 'vide'
              const hdlr = findBox(mdia.data, mdia.end, 'hdlr');
              if (hdlr && readString(view, hdlr.data + 8, 4) === 'vide') {
                // Get timescale from mdhd
                const mdhd = findBox(mdia.data, mdia.end, 'mdhd');
                if (mdhd) {
                  const version = view.getUint8(mdhd.data);
                  // version 0: creation(4)+modification(4) = 8 bytes before timescale
                  // version 1: creation(8)+modification(8) = 16 bytes before timescale
                  const timescaleOff = mdhd.data + 1 + 3 + (version === 1 ? 16 : 8);
                  const timescale = view.getUint32(timescaleOff, false);
                  if (!timescale) break;

                  // Get sample_delta from stts (inside minf > stbl)
                  const minf = findBox(mdia.data, mdia.end, 'minf');
                  if (minf) {
                    const stbl = findBox(minf.data, minf.end, 'stbl');
                    if (stbl) {
                      const stts = findBox(stbl.data, stbl.end, 'stts');
                      if (stts) {
                        // version(1) + flags(3) + entry_count(4) + sample_count(4) + sample_delta(4)
                        const sampleDelta = view.getUint32(stts.data + 8, false);
                        if (sampleDelta > 0) {
                          const fps = timescale / sampleDelta;
                          // Round to 3 significant figures; common values: 23.976, 24, 25, 29.97, 30, 60
                          return Math.round(fps * 1000) / 1000;
                        }
                      }
                    }
                  }
                }
              }
            }
          }
          off += size;
        }
      } catch (_) { /* malformed box — return null */ }

      return null;
    }

    // ── File routing ──────────────────────────────────────────────────────────

    function analyzeFile(file) {
      if (!file) return;
      if (file.type.startsWith('image/')) analyzeImage(file);
      else if (file.type.startsWith('video/')) analyzeVideo(file);
    }

    // ── Image analysis ────────────────────────────────────────────────────────

    function analyzeImage(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const buffer = e.target.result;
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
          const w = img.naturalWidth, h = img.naturalHeight;
          const mime = file.type.toLowerCase();
          let dpiInfo = null;
          if (mime === 'image/jpeg' || mime === 'image/jpg') dpiInfo = parseJPEGDPI(buffer);
          else if (mime === 'image/png') dpiInfo = parsePNGDPI(buffer);
          showImageResults(file, url, w, h, dpiInfo);
        };
        img.onerror = () => { URL.revokeObjectURL(url); alert('Could not read image dimensions.'); };
        img.src = url;
      };
      reader.readAsArrayBuffer(file);
    }

    function showImageResults(file, url, w, h, dpiInfo) {
      // Preview: show img, hide canvas
      const preview = document.getElementById('preview');
      if (preview._prevURL) URL.revokeObjectURL(preview._prevURL);
      preview._prevURL = url;
      preview.src = url;
      preview.classList.remove('hidden');
      document.getElementById('videoThumb').classList.add('hidden');

      // Toggle cells
      document.getElementById('cell-pixels').classList.remove('hidden');
      document.getElementById('cell-dpi').classList.remove('hidden');
      document.getElementById('cell-duration').classList.add('hidden');
      document.getElementById('cell-bitrate').classList.add('hidden');
      document.getElementById('cell-fps').classList.add('hidden');

      // Populate shared stats
      document.getElementById('stat-format').textContent = formatMimeType(file.type);
      document.getElementById('stat-size').textContent = formatBytes(file.size);
      document.getElementById('stat-resolution').textContent = `${w} × ${h} px`;

      // Image-specific stats
      document.getElementById('stat-pixels').textContent = (w * h).toLocaleString() + ' px²';
      const dpiEl = document.getElementById('stat-dpi');
      const dpiNote = document.getElementById('stat-dpi-note');
      if (dpiInfo) {
        dpiEl.textContent = dpiInfo.label;
        dpiNote.textContent = dpiInfo.note || '';
        dpiNote.classList.toggle('hidden', !dpiInfo.note);
      } else {
        const supported = ['image/jpeg','image/jpg','image/png'].includes(file.type.toLowerCase());
        dpiEl.textContent = 'Not embedded';
        dpiNote.textContent = supported ? 'No DPI metadata found in this file.' : 'DPI metadata parsing not supported for this format.';
        dpiNote.classList.remove('hidden');
      }

      document.getElementById('results').classList.remove('hidden');
    }

    // ── Video analysis ────────────────────────────────────────────────────────

    function analyzeVideo(file) {
      const url = URL.createObjectURL(file);
      const video = document.createElement('video');
      video.preload = 'metadata';
      video.muted = true;

      video.onloadedmetadata = () => {
        // Seek to 1s or 10% of duration, whichever is smaller, to grab a representative frame
        video.currentTime = Math.min(1, video.duration * 0.1);
      };

      video.onseeked = () => {
        // Draw frame to canvas thumbnail
        const canvas = document.getElementById('videoThumb');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        const mime = file.type.toLowerCase();
        const needsFpsParse = mime === 'video/mp4' || mime === 'video/quicktime';

        if (needsFpsParse) {
          // Read only the first 5 MB — moov is almost always near the start
          const chunk = file.slice(0, 5 * 1024 * 1024);
          const reader = new FileReader();
          reader.onload = (e) => {
            const fps = parseMP4FrameRate(e.target.result);
            showVideoResults(file, canvas, video.videoWidth, video.videoHeight, video.duration, fps, 'Source: MP4 moov/trak/mdia');
            URL.revokeObjectURL(url);
          };
          reader.onerror = () => {
            showVideoResults(file, canvas, video.videoWidth, video.videoHeight, video.duration, null, null);
            URL.revokeObjectURL(url);
          };
          reader.readAsArrayBuffer(chunk);
        } else {
          showVideoResults(file, canvas, video.videoWidth, video.videoHeight, video.duration, null, null);
          URL.revokeObjectURL(url);
        }
      };

      video.onerror = () => { URL.revokeObjectURL(url); alert('Could not read video.'); };
      video.src = url;
    }

    function showVideoResults(file, canvas, w, h, duration, fps, fpsNote) {
      // Preview: show canvas, hide img
      const preview = document.getElementById('preview');
      if (preview._prevURL) { URL.revokeObjectURL(preview._prevURL); preview._prevURL = null; }
      preview.classList.add('hidden');
      canvas.classList.remove('hidden');

      // Toggle cells
      document.getElementById('cell-pixels').classList.add('hidden');
      document.getElementById('cell-dpi').classList.add('hidden');
      document.getElementById('cell-duration').classList.remove('hidden');
      document.getElementById('cell-bitrate').classList.remove('hidden');
      document.getElementById('cell-fps').classList.remove('hidden');

      // Populate shared stats
      document.getElementById('stat-format').textContent = formatMimeType(file.type);
      document.getElementById('stat-size').textContent = formatBytes(file.size);
      document.getElementById('stat-resolution').textContent = w && h ? `${w} × ${h} px` : '—';

      // Video-specific stats
      document.getElementById('stat-duration').textContent = formatDuration(duration);
      document.getElementById('stat-bitrate').textContent = formatBitrate(file.size, duration);

      const fpsEl = document.getElementById('stat-fps');
      const fpsNoteEl = document.getElementById('stat-fps-note');
      if (fps !== null) {
        fpsEl.textContent = fps + ' fps';
        fpsNoteEl.textContent = fpsNote || '';
        fpsNoteEl.classList.toggle('hidden', !fpsNote);
      } else {
        fpsEl.textContent = '—';
        fpsNoteEl.textContent = 'Frame rate not available for this format.';
        fpsNoteEl.classList.remove('hidden');
      }

      document.getElementById('results').classList.remove('hidden');
    }

    // ── Input handlers ────────────────────────────────────────────────────────

    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) analyzeFile(fileInput.files[0]); });
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('drop-active'); });
    ['dragleave','dragend'].forEach(ev => dropzone.addEventListener(ev, () => dropzone.classList.remove('drop-active')));
    dropzone.addEventListener('drop', (e) => { e.preventDefault(); dropzone.classList.remove('drop-active'); const f = e.dataTransfer.files[0]; if (f) analyzeFile(f); });
    dropzone.addEventListener('click', (e) => { if (e.target === fileInput || e.target.closest('label')) return; fileInput.click(); });
    document.addEventListener('paste', (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) { if (item.kind === 'file' && item.type.startsWith('image/')) { analyzeFile(item.getAsFile()); break; } }
    });
  </script>
</body>
</html>
